name: Repository Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  ops013-followup-patch:
    name: Apply OPS-013 follow-up patch
    if: github.head_ref == 'ops/sre'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout OPS-013 branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ops/sre
          fetch-depth: 0
          persist-credentials: true

      - name: Apply patch when absent
        id: patch
        run: |
          if grep -Fq 'APPROVED_AWS_REGION="ap-northeast-2"' infra/production/db-backup-restore.sh; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python -m py_compile scripts/ops013_followup_patch_v2.py
          python scripts/ops013_followup_patch_v2.py
          bash -n infra/production/db-backup-restore.sh infra/production/test-db-backup-restore.sh
          python infra/production/validate-production-contracts.py
          git diff --check
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Commit focused changes
        if: steps.patch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            infra/production/db-backup-restore.sh \
            infra/production/test-db-backup-restore.sh \
            infra/production/validate-production-contracts.py \
            docs/runbook/OPS-013-production-db-backup-restore.md \
            docs/reports/OPS-013/sre-report.md \
            docs/handoffs/OPS-013/sre-to-tl.md
          git diff --cached --quiet && { echo "No focused changes produced" >&2; exit 1; }
          git commit -m "fix(sre): OPS-013 백업 복구 계약 보완"
          git push origin HEAD:ops/sre

  conventions:
    name: Commit and PR conventions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          sh scripts/validate-commit-message.sh --message "$PR_TITLE"

      - name: Validate PR body encoding
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" | python scripts/validate-pr-body-encoding.py --from-stdin

      - name: Validate task artifacts
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n\n%s\n' "$PR_TITLE" "$PR_BODY" | python scripts/validate-task-artifacts.py --from-stdin

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          failed=0
          for sha in $(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA"); do
            subject="$(git log -1 --format=%s "$sha")"
            echo "검증 중: ${sha} ${subject}"
            if ! sh scripts/validate-commit-message.sh --message "$subject"; then
              echo "::error title=Invalid commit message::${sha} ${subject}"
              failed=1
            fi
          done
          exit "$failed"

      - name: Check whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --check "$BASE_SHA..$HEAD_SHA"

  application:
    name: Application validation
    runs-on: ubuntu-latest
    needs: conventions
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: pawcycle_test
          MYSQL_USER: pawcycle_ci
          MYSQL_PASSWORD: ci-only-not-a-secret
          MYSQL_ROOT_PASSWORD: ci-only-root-not-a-secret
        ports:
          - 3306/tcp
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s
    steps:
      - name: Checkout pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate production deployment and recovery contracts
        run: |
          bash -n \
            infra/production/release-common.sh \
            infra/production/materialize-ssm-env.sh \
            infra/production/deploy.sh \
            infra/production/rollback.sh \
            infra/production/https.sh \
            infra/production/db-backup-restore.sh \
            infra/production/test-production-scripts.sh \
            infra/production/test-production-nginx.sh \
            infra/production/test-production-compose.sh \
            infra/production/test-db-backup-restore.sh
          python infra/production/validate-production-contracts.py
          bash infra/production/test-production-scripts.sh
          bash infra/production/test-production-nginx.sh
          bash infra/production/test-production-compose.sh
          bash infra/production/test-db-backup-restore.sh

      - name: Verify MySQL service
        env:
          MYSQL_CONTAINER_ID: ${{ job.services.mysql.id }}
          MYSQL_DATABASE: pawcycle_test
          MYSQL_USERNAME: pawcycle_ci
          MYSQL_PASSWORD: ci-only-not-a-secret
          MYSQL_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          test -n "$MYSQL_CONTAINER_ID"
          test -n "$MYSQL_PORT"

          service_info="$(docker exec \
            --env MYSQL_PWD="$MYSQL_PASSWORD" \
            "$MYSQL_CONTAINER_ID" \
            mysql --batch --skip-column-names \
            --user="$MYSQL_USERNAME" \
            "$MYSQL_DATABASE" \
            --execute="SELECT CONCAT(@@version, '|', @@character_set_server, '|', @@collation_server);")"

          IFS='|' read -r mysql_version character_set collation <<< "$service_info"

          case "$mysql_version" in
            8.4.*) ;;
            *)
              echo "::error title=Unexpected MySQL version::MySQL 8.4 LTS가 필요합니다."
              exit 1
              ;;
          esac

          test "$character_set" = "utf8mb4"
          test "$collation" = "utf8mb4_0900_ai_ci"

      - name: Set up Java 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: temurin
          java-version: '25'

      - name: Prepare Gradle wrapper
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Backend test
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:${{ job.services.mysql.ports['3306'] }}/pawcycle_test
          SPRING_DATASOURCE_USERNAME: pawcycle_ci
          SPRING_DATASOURCE_PASSWORD: ci-only-not-a-secret
        run: ./gradlew test

      - name: Backend build
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:${{ job.services.mysql.ports['3306'] }}/pawcycle_test
          SPRING_DATASOURCE_USERNAME: pawcycle_ci
          SPRING_DATASOURCE_PASSWORD: ci-only-not-a-secret
        run: ./gradlew build

      - name: Set up Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build
