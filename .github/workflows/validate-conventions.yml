name: Repository Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  conventions:
    name: Commit and PR conventions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          sh scripts/validate-commit-message.sh --message "$PR_TITLE"

      - name: Validate PR body encoding
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" | python scripts/validate-pr-body-encoding.py --from-stdin

      - name: Validate task artifacts
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n\n%s\n' "$PR_TITLE" "$PR_BODY" | python scripts/validate-task-artifacts.py --from-stdin

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          failed=0
          for sha in $(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA"); do
            subject="$(git log -1 --format=%s "$sha")"
            echo "검증 중: ${sha} ${subject}"
            if ! sh scripts/validate-commit-message.sh --message "$subject"; then
              echo "::error title=Invalid commit message::${sha} ${subject}"
              failed=1
            fi
          done
          exit "$failed"

      - name: Check whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --check "$BASE_SHA..$HEAD_SHA"

  application:
    name: Application validation
    runs-on: ubuntu-latest
    needs: conventions
    steps:
      - name: Checkout pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: temurin
          java-version: '25'

      - name: Prepare Gradle wrapper
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Backend test
        working-directory: backend
        run: ./gradlew test

      - name: Backend build
        working-directory: backend
        run: ./gradlew build

      - name: Set up Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build
