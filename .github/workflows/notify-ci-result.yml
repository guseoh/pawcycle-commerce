name: CI Result Notification

on:
  workflow_run:
    workflows: ["Repository Validation"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  discord:
    name: Discord CI result notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Build Discord payload
        env:
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
        run: |
          event="ci_failure"
          status="실패"
          summary="검증 중 오류가 발생했습니다."
          if [ "$CONCLUSION" = "success" ]; then
            event="ci_success"
            status="성공"
            summary="모든 검증 단계가 통과했습니다."
          fi

          python .github/scripts/build-discord-payload.py \
            --event "$event" \
            --repository "$REPOSITORY" \
            --number "$WORKFLOW_NAME" \
            --task-id "" \
            --actor "$ACTOR" \
            --branch "$HEAD_BRANCH" \
            --target "$WORKFLOW_NAME" \
            --sha "$HEAD_SHA" \
            --status "$status" \
            --validation "커밋 규칙 · PR 제목 · 산출물" \
            --summary "$summary" \
            --url "$WORKFLOW_URL" > discord-payload.json

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python .github/scripts/send-discord-notification.py --payload-file discord-payload.json
