name: Record Merged Pull Request

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read
  checks: read

jobs:
  obsidian:
    name: Create Obsidian PR record
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create PR record
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .github/scripts/record-merged-pr.py --event-path "$GITHUB_EVENT_PATH"

      - name: Commit PR record
        run: |
          if [ -z "$(git status --porcelain -- docs/learning/pull-requests)" ]; then
            echo "생성할 PR 기록이 없습니다." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/learning/pull-requests
          git commit -m "docs(obsidian): PR #${{ github.event.pull_request.number }} 기록 추가"

          if git push; then
            echo "Obsidian PR 기록을 main에 커밋했습니다." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Obsidian PR 기록 커밋 또는 push가 실패했습니다. 브랜치 보호 정책을 확인하세요." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
