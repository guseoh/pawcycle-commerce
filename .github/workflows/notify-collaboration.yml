name: Collaboration Notification

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Preview scenario
        required: true
        type: choice
        options:
          - connection_test
          - pr_preview
        default: connection_test
      pr_number:
        description: PR number for pr_preview
        required: false
        type: string
  workflow_run:
    workflows: [Repository Validation]
    types: [completed]
  pull_request_target:
    types: [opened, ready_for_review, reopened, closed, review_requested, synchronize]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, reopened, assigned, closed]

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: read

jobs:
  discord:
    name: Discord collaboration report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted notification scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Collect normalized collaboration context
        id: context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFICATION_SCENARIO: ${{ inputs.scenario }}
          NOTIFICATION_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [ ! -f .github/scripts/collect-discord-context.py ]; then
            echo "필수 Discord context collector가 없습니다." >&2
            exit 1
          fi
          python .github/scripts/collect-discord-context.py \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --scenario "$NOTIFICATION_SCENARIO" \
            --pr-number "$NOTIFICATION_PR_NUMBER" \
            --output discord-context.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          context = json.loads(Path("discord-context.json").read_text(encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"notify={'true' if context.get('notify') else 'false'}\n")
          PY

      - name: Build Discord report payload
        if: steps.context.outputs.notify == 'true'
        run: python .github/scripts/build-discord-payload.py --context-file discord-context.json > discord-payload.json

      - name: Validate Discord payload contract
        if: steps.context.outputs.notify == 'true'
        run: python .github/scripts/discord-message-contract.py --payload-file discord-payload.json --context-file discord-context.json

      - name: Send Discord notification
        if: steps.context.outputs.notify == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: >-
          python .github/scripts/send-discord-notification.py
          --payload-file discord-payload.json
          --context-file discord-context.json
          --wait-for-message
