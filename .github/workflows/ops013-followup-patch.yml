name: OPS-013 Follow-up Patch

on:
  push:
    branches:
      - ops/sre
    paths:
      - .github/workflows/ops013-followup-patch.yml
      - scripts/ops013_followup_patch_v2.py
      - scripts/ops013_followup_patch_v3.py
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ops013-followup-patch.yml
      - scripts/ops013_followup_patch_v2.py
      - scripts/ops013_followup_patch_v3.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout OPS-013 branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ops/sre
          fetch-depth: 1
          persist-credentials: true
          show-progress: false

      - name: Validate patcher syntax
        run: python -m py_compile scripts/ops013_followup_patch_v2.py scripts/ops013_followup_patch_v3.py

      - name: Apply focused follow-up patch
        id: patch
        run: |
          set +e
          output="$(python scripts/ops013_followup_patch_v3.py 2>&1)"
          status=$?
          set -e
          if (( status != 0 )); then
            printf '%s\n' "$output" > scripts/ops013_patch_error.txt
            echo 'failed=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rm -f scripts/ops013_patch_error.txt
          echo 'failed=false' >> "$GITHUB_OUTPUT"

      - name: Commit patch diagnostic
        if: steps.patch.outputs.failed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ops013_patch_error.txt
          git commit -m "chore(sre): OPS-013 패치 실패 진단 기록"
          git push origin HEAD:ops/sre
          exit 1

      - name: Validate focused changes
        if: steps.patch.outputs.failed == 'false'
        run: |
          bash -n infra/production/db-backup-restore.sh infra/production/test-db-backup-restore.sh
          python infra/production/validate-production-contracts.py
          git diff --check

      - name: Commit focused changes
        if: steps.patch.outputs.failed == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            infra/production/db-backup-restore.sh \
            infra/production/test-db-backup-restore.sh \
            infra/production/validate-production-contracts.py \
            docs/runbook/OPS-013-production-db-backup-restore.md \
            docs/reports/OPS-013/sre-report.md \
            docs/handoffs/OPS-013/sre-to-tl.md
          git diff --cached --quiet && { echo "No focused changes produced" >&2; exit 1; }
          git commit -m "fix(sre): OPS-013 백업 복구 계약 보완"
          git push origin HEAD:ops/sre
