name: Publish production images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-images-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate immutable release input
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          case "$RELEASE_SHA" in
            *[!0-9a-f]*|'')
              echo "::error title=Invalid release SHA::40자의 소문자 commit SHA가 필요합니다."
              exit 1
              ;;
          esac
          test "${#RELEASE_SHA}" -eq 40

      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        id: backend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: infra/production/backend.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false
          sbom: false

      - name: Build and push Frontend image
        id: frontend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: infra/production/frontend.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false
          sbom: false

      - name: Record immutable image outputs
        env:
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ steps.frontend.outputs.digest }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          test -n "$BACKEND_DIGEST"
          test -n "$FRONTEND_DIGEST"
          {
            echo '## Production image release'
            echo
            echo "- commit SHA: \`$RELEASE_SHA\`"
            echo "- Backend digest: \`$BACKEND_DIGEST\`"
            echo "- Frontend digest: \`$FRONTEND_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"
