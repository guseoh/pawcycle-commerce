name: Product Decision
description: 사용자 문제와 제품 정책 결정을 정리합니다.
title: "[PRODUCT-000] "
body:
  - type: markdown
    attributes:
      value: |
        Secret, 개인정보, 실제 결제 정보는 입력하지 마세요.
  - type: input
    id: task-id
    attributes:
      label: 작업 ID
      placeholder: PS-001
    validations:
      required: true
  - type: textarea
    id: user-problem
    attributes:
      label: 사용자 문제
      description: 사용자가 겪는 문제를 제품 관점으로 설명합니다.
    validations:
      required: true
  - type: textarea
    id: policy
    attributes:
      label: 결정할 정책
      description: 이번 Issue에서 확정해야 할 제품 정책입니다.
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: 선택지
      description: 가능한 선택지와 차이를 적습니다.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 사용자·운영 영향
    validations:
      required: true
  - type: textarea
    id: mvp-impact
    attributes:
      label: MVP 영향
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: 추천안
    validations:
      required: false
  - type: dropdown
    id: approval
    attributes:
      label: 승인 상태
      options:
        - 검토 필요
        - 승인
        - 반려
    validations:
      required: true
