name: Technical Decision
description: 기술 결정, 제약, 대안, 운영 영향을 정리합니다.
title: "[ARCH-000] "
body:
  - type: markdown
    attributes:
      value: |
        Secret, 개인정보, 실제 결제 정보는 입력하지 마세요.
  - type: input
    id: task-id
    attributes:
      label: 작업 ID
      placeholder: ARCH-001
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 기술 문제
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 제약
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: 장단점
    validations:
      required: true
  - type: textarea
    id: impacts
    attributes:
      label: 운영·보안·성능 영향
    validations:
      required: true
  - type: textarea
    id: rollback-cost
    attributes:
      label: 되돌리기 비용
    validations:
      required: true
  - type: dropdown
    id: adr-required
    attributes:
      label: ADR 필요 여부
      options:
        - 필요
        - 불필요
        - 검토 필요
    validations:
      required: true
  - type: dropdown
    id: approval
    attributes:
      label: 승인 상태
      options:
        - 검토 필요
        - 승인
        - 반려
    validations:
      required: true
