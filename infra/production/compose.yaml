name: pawcycle-production

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.4.10@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    env_file:
      - ${PAWCYCLE_MYSQL_ENV_FILE:?PAWCYCLE_MYSQL_ENV_FILE is required}
    healthcheck:
      test:
        - CMD-SHELL
        - MYSQL_PWD="$${MYSQL_PASSWORD}" mysql --protocol=TCP --host=127.0.0.1 --user="$${MYSQL_USER}" --database="$${MYSQL_DATABASE}" --batch --skip-column-names --execute="SELECT 1" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - data
    mem_limit: 640m
    cpus: 0.70
    pids_limit: 256
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}:${RELEASE_SHA:?RELEASE_SHA is required}
    env_file:
      - ${PAWCYCLE_BACKEND_ENV_FILE:?PAWCYCLE_BACKEND_ENV_FILE is required}
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=65.0 -XX:+ExitOnOutOfMemoryError
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SESSION_COOKIE_SECURE: "true"
      SPRING_PROFILES_ACTIVE: production
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - http://127.0.0.1:8080/api/products
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - app
      - data
    mem_limit: 640m
    cpus: 0.75
    pids_limit: 256
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}:${RELEASE_SHA:?RELEASE_SHA is required}
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/products').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /app/.next/cache:size=32m,mode=0755,uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true
    networks:
      - app
    mem_limit: 256m
    cpus: 0.35
    pids_limit: 128
    logging: *default-logging

  proxy:
    image: nginx:1.30.3-alpine3.23@sha256:0d3b80406a13a767339fbe2f41406d6c7da727ab89cf8fae399e81f780f814d1
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PAWCYCLE_HTTP_PORT:-80}:80"
      - "${PAWCYCLE_HTTPS_PORT:-443}:443"
    volumes:
      - ${PAWCYCLE_NGINX_CONFIG:-./nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=/dev/null
        - http://127.0.0.1:8081/products
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 20s
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m,mode=0755
      - /var/run:size=1m,mode=0755
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - app
    mem_limit: 128m
    cpus: 0.20
    pids_limit: 64
    logging: *default-logging

volumes:
  mysql-data:
    name: ${PAWCYCLE_MYSQL_VOLUME:-pawcycle-production-mysql-data}
  certbot-webroot:
    name: ${PAWCYCLE_CERTBOT_WEBROOT_VOLUME:-pawcycle-production-certbot-webroot}
  letsencrypt:
    name: ${PAWCYCLE_LETSENCRYPT_VOLUME:-pawcycle-production-letsencrypt}

networks:
  edge:
    name: ${PAWCYCLE_EDGE_NETWORK:-pawcycle-production-edge}
  app:
    name: ${PAWCYCLE_APP_NETWORK:-pawcycle-production-app}
    internal: true
  data:
    name: ${PAWCYCLE_DATA_NETWORK:-pawcycle-production-data}
    internal: true
