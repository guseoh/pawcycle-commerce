name: pawcycle-local-integration

services:
  mysql:
    image: mysql:8.4.10
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    healthcheck:
      test:
        - CMD-SHELL
        - MYSQL_PWD="$${MYSQL_PASSWORD}" mysqladmin ping --host=127.0.0.1 --user="$${MYSQL_USER}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ../..
      dockerfile: infra/local-integration/backend.Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local-integration
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:?MYSQL_DATABASE is required}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:?MYSQL_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      PAWCYCLE_LOCAL_QA_BOOTSTRAP_ENABLED: "true"
      PAWCYCLE_LOCAL_QA_BOOTSTRAP_EMAIL: ${PAWCYCLE_LOCAL_QA_BOOTSTRAP_EMAIL:?PAWCYCLE_LOCAL_QA_BOOTSTRAP_EMAIL is required}
      PAWCYCLE_LOCAL_QA_BOOTSTRAP_PASSWORD: ${PAWCYCLE_LOCAL_QA_BOOTSTRAP_PASSWORD:?PAWCYCLE_LOCAL_QA_BOOTSTRAP_PASSWORD is required}
      PAWCYCLE_LOCAL_QA_BOOTSTRAP_RESET_SUBSCRIPTIONS: ${PAWCYCLE_LOCAL_QA_BOOTSTRAP_RESET_SUBSCRIPTIONS:-false}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SESSION_COOKIE_SECURE: "false"
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - http://127.0.0.1:8080/api/products
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: ../..
      dockerfile: infra/local-integration/frontend.Dockerfile
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/products').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  proxy:
    image: nginx:1.30.3-alpine3.23
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PAWCYCLE_LOCAL_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=/dev/null
        - http://127.0.0.1/products
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mysql-data:
    name: pawcycle-local-integration-mysql-data
